AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI News Curator Lite serverless backend

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        KEYWORD_TABLE_NAME: !Ref KeywordTable

Resources:
  AiNewsCuratorLiteApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: Prod

  KeywordTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: keyword
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: keyword
          KeyType: RANGE

  AiNewsCuratorLiteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/
      Handler: app.lambda_handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:DeleteItem
              Resource: !GetAtt KeywordTable.Arn
      Events:
        HealthApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref AiNewsCuratorLiteApi
            Path: /health
            Method: GET
        NewsApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref AiNewsCuratorLiteApi
            Path: /news
            Method: GET
        CreateKeywordApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref AiNewsCuratorLiteApi
            Path: /keywords
            Method: POST
        ListKeywordsApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref AiNewsCuratorLiteApi
            Path: /keywords
            Method: GET
        DeleteKeywordApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref AiNewsCuratorLiteApi
            Path: /keywords/{keyword}
            Method: DELETE

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint
    Value: !Sub 'https://${AiNewsCuratorLiteApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
  KeywordTableName:
    Description: DynamoDB table name
    Value: !Ref KeywordTable
